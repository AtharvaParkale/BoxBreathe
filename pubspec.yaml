name: box_breathe
description: "A new Flutter project."
publish_to: 'none'
version: 2.0.0+5

environment:
  sdk: ^3.10.4
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  vibration: ^3.1.6
  audioplayers: ^6.5.1
  flutter_local_notifications: ^20.0.0
  get_it: ^9.2.0
  google_fonts: ^8.0.1
  dartz: ^0.10.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/

